<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThreatLens — AI Risk Assessment</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f;
    --bg2: #111318;
    --bg3: #181c22;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e8eaf0;
    --muted: #6b7280;
    --accent: #00d4aa;
    --red: #ff4d4d;
    --orange: #ff8c42;
    --yellow: #ffd166;
    --green: #00d4aa;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; min-height: 100vh; }

  .shell { display: grid; grid-template-columns: 320px 1fr; min-height: 100vh; }

  .sidebar { background: var(--bg2); border-right: 1px solid var(--border); padding: 28px 24px; display: flex; flex-direction: column; gap: 20px; }
  .logo { font-family: var(--mono); font-size: 13px; color: var(--accent); letter-spacing: 0.08em; display: flex; align-items: center; gap: 8px; }
  .logo::before { content: ''; width: 8px; height: 8px; background: var(--accent); border-radius: 50%; display: inline-block; box-shadow: 0 0 8px var(--accent); }
  .logo-sub { font-family: var(--sans); font-size: 11px; color: var(--muted); letter-spacing: 0.04em; margin-top: 2px; }

  .field-label { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
  textarea, select { width: 100%; background: var(--bg3); border: 1px solid var(--border2); border-radius: 6px; color: var(--text); font-family: var(--sans); font-size: 13px; padding: 10px 12px; outline: none; transition: border-color 0.2s; }
  textarea:focus, select:focus { border-color: var(--accent); }
  textarea { resize: vertical; line-height: 1.6; }
  select { cursor: pointer; }
  select option { background: var(--bg3); }

  .analyze-btn { width: 100%; padding: 12px; background: var(--accent); color: #000; font-family: var(--mono); font-size: 12px; font-weight: 500; letter-spacing: 0.08em; border: none; border-radius: 6px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .analyze-btn:hover { background: #00f0c0; }
  .analyze-btn:disabled { background: #1a2e28; color: var(--accent); cursor: not-allowed; }
  .analyze-btn .spinner { width: 12px; height: 12px; border: 1.5px solid var(--accent); border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
  .analyze-btn.loading .spinner { display: block; }
  .analyze-btn.loading .btn-text { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .examples { display: flex; flex-direction: column; gap: 6px; }
  .example-btn { background: transparent; border: 1px solid var(--border); border-radius: 5px; color: var(--muted); font-family: var(--sans); font-size: 12px; padding: 7px 10px; cursor: pointer; text-align: left; transition: all 0.15s; }
  .example-btn:hover { border-color: var(--border2); color: var(--text); }

  .main { padding: 28px 32px; overflow-y: auto; }

  .empty-state { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--muted); font-family: var(--mono); font-size: 12px; }
  .empty-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; opacity: 0.15; margin-bottom: 24px; }
  .empty-cell { width: 40px; height: 40px; border: 1px solid var(--muted); }

  .results { display: none; flex-direction: column; gap: 24px; animation: fadeIn 0.4s ease; }
  .results.visible { display: flex; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .results-header { display: flex; align-items: baseline; justify-content: space-between; }
  .results-title { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
  .export-btn { background: transparent; border: 1px solid var(--border2); border-radius: 4px; color: var(--muted); font-family: var(--mono); font-size: 10px; padding: 4px 10px; cursor: pointer; letter-spacing: 0.06em; transition: all 0.15s; }
  .export-btn:hover { border-color: var(--accent); color: var(--accent); }

  .score-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .score-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
  .score-card-label { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 0.08em; margin-bottom: 8px; }
  .score-card-val { font-size: 28px; font-weight: 300; line-height: 1; }
  .score-card-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .col-red { color: var(--red); }
  .col-orange { color: var(--orange); }
  .col-yellow { color: var(--yellow); }

  .stride-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .stride-pill { font-family: var(--mono); font-size: 10px; padding: 4px 12px; border-radius: 3px; border: 1px solid var(--border); color: var(--muted); letter-spacing: 0.06em; }
  .stride-pill.active { border-color: var(--accent); color: var(--accent); background: rgba(0,212,170,0.06); }

  .tab-bar { display: flex; gap: 0; border-bottom: 1px solid var(--border); }
  .tab { font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em; padding: 10px 18px; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .tab-content { display: none; padding-top: 16px; }
  .tab-content.active { display: block; }

  .threat-list { display: flex; flex-direction: column; gap: 10px; }
  .threat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 16px 18px; border-left: 3px solid var(--border); }
  .threat-card.sev-critical { border-left-color: var(--red); }
  .threat-card.sev-high { border-left-color: var(--orange); }
  .threat-card.sev-medium { border-left-color: var(--yellow); }
  .threat-card.sev-low { border-left-color: var(--green); }

  .threat-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
  .threat-name { font-size: 14px; font-weight: 500; line-height: 1.3; }
  .threat-badges { display: flex; gap: 6px; flex-shrink: 0; align-items: center; }
  .badge { font-family: var(--mono); font-size: 9px; padding: 2px 7px; border-radius: 3px; letter-spacing: 0.06em; font-weight: 500; }
  .badge-stride { background: rgba(255,255,255,0.06); color: var(--muted); }
  .badge-critical { background: rgba(255,77,77,0.12); color: var(--red); }
  .badge-high { background: rgba(255,140,66,0.12); color: var(--orange); }
  .badge-medium { background: rgba(255,209,102,0.12); color: var(--yellow); }
  .badge-low { background: rgba(0,212,170,0.12); color: var(--green); }

  .threat-component { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-bottom: 8px; }
  .threat-desc { font-size: 13px; color: rgba(232,234,240,0.75); line-height: 1.6; margin-bottom: 10px; }
  .threat-scores { display: flex; gap: 16px; margin-bottom: 10px; flex-wrap: wrap; }
  .threat-score-item { display: flex; flex-direction: column; gap: 2px; }
  .threat-score-label { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 0.06em; }
  .threat-score-val { font-family: var(--mono); font-size: 13px; font-weight: 500; }
  .score-bar { height: 3px; background: var(--bg3); border-radius: 2px; margin-top: 2px; width: 60px; }
  .score-bar-fill { height: 100%; border-radius: 2px; }
  .mitigation-box { background: var(--bg3); border-radius: 5px; padding: 10px 12px; font-size: 12px; color: rgba(232,234,240,0.65); line-height: 1.6; }
  .mitigation-label { font-family: var(--mono); font-size: 9px; color: var(--accent); letter-spacing: 0.08em; margin-bottom: 4px; }

  .matrix-grid { display: grid; grid-template-columns: 40px repeat(5, 1fr); gap: 3px; }
  .matrix-label { font-family: var(--mono); font-size: 9px; color: var(--muted); display: flex; align-items: center; justify-content: center; letter-spacing: 0.04em; }
  .matrix-cell { height: 52px; border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 2px; padding: 4px; }
  .matrix-axis-label { font-family: var(--mono); font-size: 9px; color: var(--muted); text-align: center; letter-spacing: 0.04em; padding: 4px 0; }
  .threat-dot { width: 8px; height: 8px; border-radius: 50%; }

  .error-msg { background: rgba(255,77,77,0.08); border: 1px solid rgba(255,77,77,0.2); border-radius: 6px; padding: 12px 16px; font-family: var(--mono); font-size: 12px; color: var(--red); margin-top: 16px; }

  #attack-tree-svg svg { display: block; width: 100%; }
</style>
</head>
<body>

<div class="shell">
  <aside class="sidebar">
    <div>
      <div class="logo">THREATLENS</div>
      <div class="logo-sub">AI-Powered Risk Assessment</div>
    </div>

    <div>
      <div class="field-label">System Description</div>
      <textarea id="system-desc" rows="9" placeholder="Describe your system — components, users, data flows, trust boundaries, auth methods, external services..."></textarea>
    </div>

    <div>
      <div class="field-label">Framework</div>
      <select id="framework">
        <option value="STRIDE+DREAD">STRIDE + DREAD scoring</option>
        <option value="STRIDE">STRIDE only</option>
        <option value="DREAD">DREAD only</option>
      </select>
    </div>

    <button class="analyze-btn" id="analyze-btn" onclick="runAnalysis()">
      <div class="spinner"></div>
      <span class="btn-text">▶ RUN ANALYSIS</span>
    </button>

    <div>
      <div class="field-label" style="margin-bottom: 8px;">Quick Examples</div>
      <div class="examples">
        <button class="example-btn" onclick="loadExample('saas')">SaaS web app with file uploads</button>
        <button class="example-btn" onclick="loadExample('iot')">IoT sensor network</button>
        <button class="example-btn" onclick="loadExample('api')">Public REST API + microservices</button>
      </div>
    </div>
  </aside>

  <main class="main" id="main">
    <div class="empty-state" id="empty-state">
      <div class="empty-grid">
        <div class="empty-cell"></div><div class="empty-cell"></div><div class="empty-cell"></div>
        <div class="empty-cell"></div><div class="empty-cell"></div><div class="empty-cell"></div>
        <div class="empty-cell"></div><div class="empty-cell"></div><div class="empty-cell"></div>
      </div>
      <div>DESCRIBE A SYSTEM TO BEGIN</div>
      <div style="color: #374151; font-size: 10px;">STRIDE · DREAD · ATTACK TREES · RISK MATRIX</div>
    </div>

    <div class="results" id="results">
      <div class="results-header">
        <div class="results-title" id="results-title">ANALYSIS COMPLETE</div>
        <button class="export-btn" onclick="exportReport()">EXPORT REPORT</button>
      </div>
      <div class="score-grid" id="score-grid"></div>
      <div>
        <div class="field-label" style="margin-bottom: 8px;">STRIDE Coverage</div>
        <div class="stride-row" id="stride-pills"></div>
      </div>
      <div>
        <div class="tab-bar">
          <div class="tab active" onclick="switchTab('threats', this)">THREATS</div>
          <div class="tab" onclick="switchTab('matrix', this)">RISK MATRIX</div>
          <div class="tab" onclick="switchTab('tree', this)">ATTACK TREE</div>
        </div>
        <div class="tab-content active" id="tab-threats">
          <div class="threat-list" id="threat-list"></div>
        </div>
        <div class="tab-content" id="tab-matrix">
          <div id="matrix-wrap"></div>
        </div>
        <div class="tab-content" id="tab-tree">
          <div id="attack-tree-svg"></div>
        </div>
      </div>
    </div>

    <div id="error-area"></div>
  </main>
</div>

<script>
  // ── CONFIG ──────────────────────────────────────────────────────────────────
  // Replace this with your deployed Railway/Render URL before submitting
  const API_BASE = 'https://YOUR-BACKEND-URL.railway.app';
  // ────────────────────────────────────────────────────────────────────────────

  const EXAMPLES = {
    saas: `A multi-tenant SaaS web application. Users authenticate with email/password (no MFA). Files are uploaded to S3 with presigned URLs. Admin panel lets admins view all tenant data. Backend is Node.js + PostgreSQL. JWTs are stored in localStorage. No audit logging. Third-party analytics script loaded on all pages. Password reset via email link, no expiry.`,
    iot: `A smart building IoT system with 200+ sensors reporting temperature, occupancy, and door lock status. Sensors communicate over MQTT to a cloud broker. The broker is open to the internet. Device firmware is updated over-the-air with no signature verification. A mobile app lets facilities managers view real-time data and unlock doors. No device authentication — any device can publish to any topic.`,
    api: `A public REST API serving a mobile app. API keys issued to developers with no rate limiting. Internal microservices communicate over HTTP (no mTLS). A shared PostgreSQL database is accessed by all services with the same credentials. Logs are shipped to a third-party service. No WAF. API docs are public and include sample requests with real endpoint paths. Admin endpoints exist at /admin/* and rely on a secret header value.`
  };

  let analysisData = null;

  function loadExample(key) { document.getElementById('system-desc').value = EXAMPLES[key]; }

  function switchTab(name, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
  }

  function sevColor(sev) {
    const s = (sev || '').toLowerCase();
    if (s === 'critical') return '#ff4d4d';
    if (s === 'high') return '#ff8c42';
    if (s === 'medium') return '#ffd166';
    return '#00d4aa';
  }

  function renderResults(data) {
    analysisData = data;
    const threats = data.threats || [];

    const critical = threats.filter(t => t.severity?.toLowerCase() === 'critical').length;
    const high = threats.filter(t => t.severity?.toLowerCase() === 'high').length;
    const medium = threats.filter(t => t.severity?.toLowerCase() === 'medium').length;
    const low = threats.filter(t => t.severity?.toLowerCase() === 'low').length;
    const avgRisk = threats.length ? Math.round(threats.reduce((a, t) => a + (t.dread_score || 5), 0) / threats.length * 10) / 10 : 0;

    document.getElementById('score-grid').innerHTML = `
      <div class="score-card"><div class="score-card-label">TOTAL THREATS</div><div class="score-card-val">${threats.length}</div><div class="score-card-sub">identified</div></div>
      <div class="score-card"><div class="score-card-label">CRITICAL / HIGH</div><div class="score-card-val col-red">${critical + high}</div><div class="score-card-sub">${critical} critical, ${high} high</div></div>
      <div class="score-card"><div class="score-card-label">AVG DREAD SCORE</div><div class="score-card-val col-orange">${avgRisk}<span style="font-size:14px;color:var(--muted)">/10</span></div><div class="score-card-sub">risk rating</div></div>
      <div class="score-card"><div class="score-card-label">MED / LOW</div><div class="score-card-val col-yellow">${medium + low}</div><div class="score-card-sub">${medium} medium, ${low} low</div></div>
    `;

    const strideCategories = ['Spoofing','Tampering','Repudiation','Information Disclosure','Denial of Service','Elevation of Privilege'];
    const hitCategories = new Set(threats.map(t => t.stride_category));
    document.getElementById('stride-pills').innerHTML = strideCategories.map(c => {
      const hit = [...hitCategories].some(h => h && h.toLowerCase().includes(c.split(' ')[0].toLowerCase()));
      return `<div class="stride-pill ${hit ? 'active' : ''}">${c.toUpperCase()}</div>`;
    }).join('');

    document.getElementById('threat-list').innerHTML = threats.map(t => {
      const scores = t.dread || {};
      const scoreItems = Object.entries(scores).map(([k, v]) => `
        <div class="threat-score-item">
          <div class="threat-score-label">${k.toUpperCase()}</div>
          <div class="threat-score-val" style="color:${sevColor(t.severity)}">${v}</div>
          <div class="score-bar"><div class="score-bar-fill" style="width:${v * 10}%;background:${sevColor(t.severity)}"></div></div>
        </div>`).join('');
      const sev = (t.severity || 'medium').toLowerCase();
      return `
        <div class="threat-card sev-${sev}">
          <div class="threat-top">
            <div class="threat-name">${t.name}</div>
            <div class="threat-badges">
              <span class="badge badge-stride">${(t.stride_category || '').toUpperCase()}</span>
              <span class="badge badge-${sev}">${sev.toUpperCase()}</span>
            </div>
          </div>
          <div class="threat-component">▸ ${t.component}</div>
          <div class="threat-desc">${t.description}</div>
          ${scoreItems ? `<div class="threat-scores">${scoreItems}</div>` : ''}
          <div class="mitigation-box"><div class="mitigation-label">MITIGATION</div>${t.mitigation}</div>
        </div>`;
    }).join('');

    renderMatrix(threats);
    renderAttackTree(data);

    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('results').classList.add('visible');
  }

  function renderMatrix(threats) {
    const likelihoodLabels = ['Rare','Unlikely','Possible','Likely','Certain'];
    const impactLabels = ['Negligible','Minor','Moderate','Major','Catastrophic'];
    const colors = [
      ['#1a2e1a','#1a2e1a','#1a3a1a','#2a3a0a','#3a3010'],
      ['#1a2e1a','#1a3a1a','#2a3a0a','#3a3010','#3a2010'],
      ['#1a3a1a','#2a3a0a','#3a3010','#3a2010','#3a1010'],
      ['#2a3a0a','#3a3010','#3a2010','#3a1010','#2a0808'],
      ['#3a3010','#3a2010','#3a1010','#2a0808','#200404'],
    ];
    const grid = Array.from({length:5}, () => Array.from({length:5}, () => []));
    threats.forEach(t => {
      const l = Math.min(4, Math.max(0, Math.round((t.dread?.likelihood || 5) / 2.5)));
      const i = Math.min(4, Math.max(0, Math.round((t.dread?.damage || 5) / 2.5)));
      grid[4 - i][l].push(t);
    });

    let html = `<div style="margin-bottom:8px;font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:0.06em;">LIKELIHOOD →</div>`;
    html += `<div class="matrix-grid">`;
    html += `<div class="matrix-label">↑<br>IMPACT</div>`;
    likelihoodLabels.forEach(l => { html += `<div class="matrix-axis-label">${l}</div>`; });
    for (let row = 0; row < 5; row++) {
      html += `<div class="matrix-label" style="font-size:8px;">${impactLabels[4-row].substring(0,5)}</div>`;
      for (let col = 0; col < 5; col++) {
        const dots = grid[row][col].map(t => `<div class="threat-dot" style="background:${sevColor(t.severity)}" title="${t.name}"></div>`).join('');
        html += `<div class="matrix-cell" style="background:${colors[row][col]};">${dots}</div>`;
      }
    }
    html += '</div>';
    html += `<div style="display:flex;gap:16px;margin-top:12px;flex-wrap:wrap;">`;
    [['critical','CRITICAL'],['high','HIGH'],['medium','MEDIUM'],['low','LOW']].forEach(([cls,label]) => {
      html += `<div style="display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;color:var(--muted)"><div style="width:8px;height:8px;border-radius:50%;background:${sevColor(cls)}"></div>${label}</div>`;
    });
    html += '</div>';
    document.getElementById('matrix-wrap').innerHTML = html;
  }

  function renderAttackTree(data) {
    const threats = data.threats || [];
    if (!threats.length) return;
    const W = 900, nodeW = 160, nodeH = 44;
    const cols = Math.min(4, threats.length);
    const rows = Math.ceil(threats.length / cols);
    const totalH = 80 + rows * (nodeH + 40) + 40;
    const rootX = W / 2, rootY = 40;

    let svg = `<svg viewBox="0 0 ${W} ${totalH}" xmlns="http://www.w3.org/2000/svg" style="background:#0a0c0f;border-radius:8px;border:1px solid rgba(255,255,255,0.07)">`;
    svg += `<defs><marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="rgba(0,212,170,0.4)"/></marker></defs>`;
    svg += `<rect x="${rootX - 90}" y="${rootY - 18}" width="180" height="36" rx="4" fill="#0f2d24" stroke="#00d4aa" stroke-width="1"/>`;
    svg += `<text x="${rootX}" y="${rootY + 5}" text-anchor="middle" font-family="IBM Plex Mono" font-size="10" fill="#00d4aa" letter-spacing="1">SYSTEM COMPROMISE</text>`;

    threats.forEach((t, i) => {
      const col = i % cols;
      const row = Math.floor(i / cols);
      const colW = W / cols;
      const nx = colW * col + colW / 2;
      const ny = 110 + row * (nodeH + 40);
      const color = sevColor(t.severity);
      svg += `<line x1="${rootX}" y1="${rootY + 18}" x2="${nx}" y2="${ny}" stroke="rgba(0,212,170,0.15)" stroke-width="1" marker-end="url(#arr)"/>`;
      svg += `<rect x="${nx - nodeW/2}" y="${ny}" width="${nodeW}" height="${nodeH}" rx="4" fill="#111318" stroke="${color}" stroke-width="0.8" stroke-opacity="0.6"/>`;
      svg += `<rect x="${nx - nodeW/2}" y="${ny}" width="${nodeW}" height="3" rx="2" fill="${color}" opacity="0.8"/>`;
      const name = t.name.length > 22 ? t.name.substring(0, 20) + '…' : t.name;
      svg += `<text x="${nx}" y="${ny + 18}" text-anchor="middle" font-family="DM Sans" font-size="10" fill="#e8eaf0">${name}</text>`;
      svg += `<text x="${nx}" y="${ny + 32}" text-anchor="middle" font-family="IBM Plex Mono" font-size="8" fill="${color}" opacity="0.8">${(t.stride_category||'').toUpperCase().substring(0,18)} · ${(t.severity||'').toUpperCase()}</text>`;
    });
    svg += '</svg>';
    document.getElementById('attack-tree-svg').innerHTML = svg;
  }

  async function runAnalysis() {
    const desc = document.getElementById('system-desc').value.trim();
    if (!desc) { alert('Please describe your system first.'); return; }

    const btn = document.getElementById('analyze-btn');
    btn.classList.add('loading');
    btn.disabled = true;
    document.getElementById('error-area').innerHTML = '';
    document.getElementById('results').classList.remove('visible');
    document.getElementById('empty-state').style.display = 'flex';

    try {
      const resp = await fetch(`${API_BASE}/analyze`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_description: desc,
          framework: document.getElementById('framework').value
        })
      });

      const data = await resp.json();
      if (data.error) throw new Error(data.error);
      renderResults(data);
    } catch (err) {
      document.getElementById('error-area').innerHTML = `<div class="error-msg">Analysis failed: ${err.message}</div>`;
      document.getElementById('empty-state').style.display = 'flex';
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  function exportReport() {
    if (!analysisData) return;
    const threats = analysisData.threats || [];
    const lines = [
      '# ThreatLens Security Assessment Report',
      `Generated: ${new Date().toISOString()}`,
      '',
      '## Summary',
      `Total threats: ${threats.length}`,
      `Critical/High: ${threats.filter(t => ['critical','high'].includes(t.severity?.toLowerCase())).length}`,
      '',
      '## Threats',
      ...threats.map((t, i) => [
        `### ${i+1}. ${t.name}`,
        `**Severity:** ${t.severity} | **STRIDE:** ${t.stride_category} | **DREAD Score:** ${t.dread_score}/10`,
        `**Component:** ${t.component}`,
        '',
        t.description,
        '',
        `**Mitigation:** ${t.mitigation}`,
        ''
      ].join('\n'))
    ].join('\n');

    const blob = new Blob([lines], { type: 'text/markdown' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'threat-model-report.md'; a.click();
    URL.revokeObjectURL(url);
  }
</script>
</body>
</html>
